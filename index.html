<!DOCTYPE html>
<html>
<head>
<title>AI Career Guidance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>

/* Full screen center layout */
.home-container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Remove white box look */
.home-title {
    font-size: 36px;
    color:#d4af37;
    background:none;
    margin-bottom: 40px;
}

/* Button style */
.home-btn {
    width: 300px;
    padding: 15px;
    margin: 15px 0;
    background: rgb(247, 246, 246);
    color: #d4af37;
    border-radius: 10px;
    text-align: center;
    text-decoration:none;
    font-weight: bold;
    transition: 0.3s;
}

.home-btn:hover {
    background: #d4af37;
    color: black;
    transform: scale(1.05);
}

</style>
</head>
<body>
    
<div class="home-container">
    <h1 class="home-title">AI Based Career Guidance</h1>
    <h2 class="sub-title" style="color: #d4af37;">Select your Acadamic Group</h2>

    <a href="cs_test.html" class="home-btn">Computer Science</a>
    <a href="bio_test.html" class="home-btn">Bio Maths</a>
    <a href="commerce_test.html" class="home-btn">Commerce</a>
</div>

</body>

</html>
